<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — The Common App Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1410; --cream: #faf8f4; --accent: #c4602a;
    --accent-dark: #8c3f15; --border: rgba(26,20,16,0.15);
    --serif: 'Playfair Display', serif; --sans: 'DM Sans', sans-serif;
  }
  body {
    font-family: var(--sans); background: var(--ink); color: var(--cream);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .container {
    width: 100%; max-width: 420px;
  }
  .logo {
    font-family: var(--serif); font-size: 1.1rem; font-weight: 700;
    color: var(--cream); text-decoration: none; display: block;
    text-align: center; margin-bottom: 2.5rem; letter-spacing: -0.01em;
  }
  .card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 2.5rem;
  }
  h1 {
    font-family: var(--serif); font-size: 1.8rem; font-weight: 900;
    margin-bottom: 0.4rem; line-height: 1.1;
  }
  .subtitle {
    font-size: 0.9rem; color: rgba(250,248,244,0.55); margin-bottom: 2rem;
  }
  .field { margin-bottom: 1.2rem; }
  label {
    display: block; font-size: 0.78rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(250,248,244,0.5); margin-bottom: 0.5rem;
  }
  input {
    width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    color: var(--cream); font-family: var(--sans); font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: rgba(250,248,244,0.3); }
  .btn {
    width: 100%; padding: 0.95rem; background: var(--accent);
    border: none; border-radius: 8px; color: #fff; font-family: var(--sans);
    font-size: 0.95rem; font-weight: 500; cursor: pointer;
    transition: background 0.2s, transform 0.15s; margin-top: 0.5rem;
  }
  .btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error {
    background: rgba(220, 80, 60, 0.15); border: 1px solid rgba(220, 80, 60, 0.3);
    border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.88rem;
    color: #f4877a; margin-bottom: 1.2rem; display: none;
  }
  .divider {
    border: none; border-top: 1px solid rgba(255,255,255,0.08);
    margin: 1.5rem 0;
  }
  .enroll-link {
    text-align: center; font-size: 0.88rem; color: rgba(250,248,244,0.45);
  }
  .enroll-link a { color: var(--accent); text-decoration: none; }
  .enroll-link a:hover { text-decoration: underline; }
  .forgot { text-align: right; margin-top: -0.8rem; margin-bottom: 1.2rem; }
  .forgot a { font-size: 0.82rem; color: rgba(250,248,244,0.4); text-decoration: none; }
  .forgot a:hover { color: rgba(250,248,244,0.7); }
  .notice {
    background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.85rem;
    color: rgba(201,168,76,0.9); margin-bottom: 1.2rem; display: none;
  }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="logo">The Common App Playbook</a>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your course</p>

    <div class="notice" id="notice"></div>
    <div class="error" id="error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div class="forgot"><a href="/reset.html">Forgot password?</a></div>
      <button class="btn" type="submit" id="submitBtn">Sign in</button>
    </form>

    <hr class="divider" />
    <p class="enroll-link">Don't have access? <a href="/#pricing">Enroll for $35 →</a></p>
  </div>
</div>

<script>
  // Show notice if redirected from unpaid check
  const params = new URLSearchParams(window.location.search);
  if (params.get('reason') === 'unpaid') {
    const n = document.getElementById('notice');
    n.style.display = 'block';
    n.textContent = 'No active purchase found for that account. Please enroll to access the course.';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        credentials: 'include',
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      window.location.href = '/course.html';
    } catch (err) {
      errEl.style.display = 'block';
      errEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
