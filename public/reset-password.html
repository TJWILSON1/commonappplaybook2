<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set New Password — The Common App Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1410; --cream: #faf8f4; --accent: #c4602a;
    --accent-dark: #8c3f15; --border: rgba(26,20,16,0.15);
    --serif: 'Playfair Display', serif; --sans: 'DM Sans', sans-serif;
  }
  body {
    font-family: var(--sans); background: var(--ink); color: var(--cream);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .container {
    width: 100%; max-width: 420px;
  }
  .logo {
    font-family: var(--serif); font-size: 1.1rem; font-weight: 700;
    color: var(--cream); text-decoration: none; display: block;
    text-align: center; margin-bottom: 2.5rem; letter-spacing: -0.01em;
  }
  .card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 2.5rem;
  }
  h1 {
    font-family: var(--serif); font-size: 1.8rem; font-weight: 900;
    margin-bottom: 0.4rem; line-height: 1.1;
  }
  .subtitle {
    font-size: 0.9rem; color: rgba(250,248,244,0.55); margin-bottom: 2rem;
  }
  .field { margin-bottom: 1.2rem; }
  label {
    display: block; font-size: 0.78rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(250,248,244,0.5); margin-bottom: 0.5rem;
  }
  input {
    width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    color: var(--cream); font-family: var(--sans); font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: rgba(250,248,244,0.3); }
  .btn {
    width: 100%; padding: 0.95rem; background: var(--accent);
    border: none; border-radius: 8px; color: #fff; font-family: var(--sans);
    font-size: 0.95rem; font-weight: 500; cursor: pointer;
    transition: background 0.2s, transform 0.15s; margin-top: 0.5rem;
  }
  .btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error {
    background: rgba(220, 80, 60, 0.15); border: 1px solid rgba(220, 80, 60, 0.3);
    border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.88rem;
    color: #f4877a; margin-bottom: 1.2rem; display: none;
  }
  .success {
    background: rgba(80, 220, 100, 0.15); border: 1px solid rgba(80, 220, 100, 0.3);
    border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.88rem;
    color: #7af487; margin-bottom: 1.2rem; display: none;
  }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="logo">The Common App Playbook</a>
  <div class="card">
    <h1>Set new password</h1>
    <p class="subtitle">Enter your new password below.</p>

    <div class="success" id="success"></div>
    <div class="error" id="error"></div>

    <form id="passwordForm">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="••••••••" required autocomplete="new-password" />
      </div>
      <button class="btn" type="submit" id="submitBtn">Update password</button>
    </form>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabaseUrl = 'https://rchqmzlcwrewnpfeuwvk.supabase.co'; // Replace with your Supabase URL
  const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaHFtemxjd3Jld25wZmV1d3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODk4MjYsImV4cCI6MjA5MTI2NTgyNn0.m3aN2bZeZp1nVL27kLh8Z2hddipKZF2BBJgrl4MFhWE'; // Replace with your anon key

  const supabase = createClient(supabaseUrl, supabaseAnonKey);

  document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error');
    const successEl = document.getElementById('success');
    errEl.style.display = 'none';
    successEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Updating…';

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    if (password !== confirm) {
      errEl.style.display = 'block';
      errEl.textContent = 'Passwords do not match';
      btn.disabled = false;
      btn.textContent = 'Update password';
      return;
    }

    try {
      const { error } = await supabase.auth.updateUser({ password });
      if (error) throw error;
      successEl.style.display = 'block';
      successEl.textContent = 'Password updated! Redirecting to login…';
      setTimeout(() => {
        window.location.href = '/login.html';
      }, 2000);
    } catch (err) {
      errEl.style.display = 'block';
      errEl.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Update password';
    }
  });
</script>
</body>
</html>
