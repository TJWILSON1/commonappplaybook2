<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Course — The Common App Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1410; --ink-muted: #5a5249; --cream: #faf8f4;
    --warm: #fff9f2; --accent: #c4602a; --accent-light: #f0ddd1;
    --accent-dark: #8c3f15; --gold: #c9a84c; --gold-light: #f5edce;
    --border: rgba(26,20,16,0.12);
    --serif: 'Playfair Display', serif; --sans: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--warm); color: var(--ink); }

  /* ── Nav ── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--ink); padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .nav-logo { font-family: var(--serif); font-size: 1rem; font-weight: 700; color: var(--cream); text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 1.5rem; }
  .nav-email { font-size: 0.82rem; color: rgba(250,248,244,0.45); }
  .logout-btn {
    font-size: 0.82rem; color: rgba(250,248,244,0.5); background: none;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
    padding: 0.35rem 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .logout-btn:hover { color: var(--cream); border-color: rgba(255,255,255,0.35); }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 60px); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--cream); border-right: 1px solid var(--border);
    padding: 2rem 0; position: sticky; top: 60px; height: calc(100vh - 60px);
    overflow-y: auto;
  }
  .sidebar-header { padding: 0 1.5rem 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
  .sidebar-header h2 { font-family: var(--serif); font-size: 0.95rem; font-weight: 700; color: var(--ink); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 0.75rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .progress-text { font-size: 0.75rem; color: var(--ink-muted); margin-top: 0.4rem; }

  .module-list { list-style: none; }
  .module-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.7rem 1.5rem; cursor: pointer;
    border-left: 3px solid transparent; transition: all 0.15s;
    font-size: 0.88rem; color: var(--ink-muted);
  }
  .module-item:hover { background: rgba(196,96,42,0.06); color: var(--ink); }
  .module-item.active { border-left-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); font-weight: 500; }
  .module-item.completed { color: var(--ink); }
  .module-check {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; flex-shrink: 0; transition: all 0.2s;
  }
  .module-item.completed .module-check { background: #3a9a5c; border-color: #3a9a5c; color: #fff; }
  .module-item.active .module-check { border-color: var(--accent); }
  .module-title { flex: 1; line-height: 1.3; }

  /* ── Main content ── */
  .main { padding: 3rem 4rem; max-width: 800px; }
  .lesson-header { margin-bottom: 2.5rem; }
  .lesson-tag {
    font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 0.6rem; display: block;
  }
  .lesson-header h1 {
    font-family: var(--serif); font-size: 2.2rem; font-weight: 900;
    line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 0.8rem;
  }
  .lesson-header p { font-size: 1.05rem; color: var(--ink-muted); line-height: 1.7; }

  /* ── Lesson content ── */
  .lesson-body { font-size: 1rem; line-height: 1.8; color: var(--ink); }
  .lesson-body h2 {
    font-family: var(--serif); font-size: 1.4rem; font-weight: 700;
    margin: 2rem 0 0.8rem; color: var(--ink);
  }
  .lesson-body h3 { font-size: 1.1rem; font-weight: 500; margin: 1.5rem 0 0.6rem; }
  .lesson-body p { margin-bottom: 1.2rem; }
  .lesson-body ul, .lesson-body ol { padding-left: 1.5rem; margin-bottom: 1.2rem; }
  .lesson-body li { margin-bottom: 0.5rem; }
  .lesson-body blockquote {
    border-left: 3px solid var(--accent); padding: 1rem 1.5rem;
    background: var(--accent-light); border-radius: 0 8px 8px 0;
    margin: 1.5rem 0; font-style: italic;
  }
  .lesson-body .callout {
    background: var(--gold-light); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px; padding: 1.25rem 1.5rem; margin: 1.5rem 0;
  }
  .lesson-body .callout strong { color: #7a5c0a; display: block; margin-bottom: 0.4rem; font-style: normal; }

  /* ── Real Essay Examples ── */
  .essay-example {
    border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; margin: 2rem 0;
  }
  .essay-example-header {
    background: var(--ink); color: var(--cream);
    padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
  }
  .essay-example-header .essay-label {
    font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(250,248,244,0.55);
  }
  .essay-example-header .essay-school {
    font-family: var(--serif); font-size: 1rem; font-weight: 700; color: var(--cream);
    margin-top: 0.2rem;
  }
  .essay-example-header .essay-badge {
    background: #3a9a5c; color: #fff; font-size: 0.72rem; font-weight: 500;
    padding: 0.3rem 0.75rem; border-radius: 20px; letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .essay-example-body {
    background: #fff; padding: 1.75rem 2rem;
    font-size: 0.97rem; line-height: 1.85; color: var(--ink);
    font-style: italic; border-bottom: 1px solid var(--border);
  }
  .essay-example-body p { margin-bottom: 1.1rem; }
  .essay-example-body p:last-child { margin-bottom: 0; }
  .essay-annotation {
    background: var(--accent-light); padding: 1.25rem 2rem;
  }
  .essay-annotation .annotation-title {
    font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent-dark); font-weight: 600; margin-bottom: 0.75rem;
    font-style: normal;
  }
  .essay-annotation .annotation-point {
    display: flex; gap: 0.75rem; margin-bottom: 0.6rem; align-items: flex-start;
    font-style: normal; font-size: 0.88rem; color: var(--ink);
  }
  .essay-annotation .annotation-point .tag {
    background: var(--accent); color: #fff; font-size: 0.68rem; font-weight: 600;
    padding: 0.2rem 0.55rem; border-radius: 4px; white-space: nowrap;
    flex-shrink: 0; margin-top: 0.1rem; letter-spacing: 0.04em;
  }

  /* ── Footer nav ── */
  .lesson-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2.5rem 0; margin-top: 2.5rem; border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 0.8rem 1.5rem; border-radius: 8px; font-family: var(--sans);
    font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-block;
  }
  .nav-btn-prev { border: 1px solid var(--border); background: transparent; color: var(--ink-muted); }
  .nav-btn-prev:hover { border-color: var(--ink); color: var(--ink); }
  .nav-btn-next { background: var(--accent); border: none; color: #fff; }
  .nav-btn-next:hover { background: var(--accent-dark); }
  .nav-btn-next.complete { background: #3a9a5c; }
  .nav-btn-next.complete:hover { background: #2d7a48; }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .main { padding: 2rem; }
  }
</style>
</head>

const modules = [
  {
    id: 1,
    title: "Introduction & Strategy",
    tag: "Module 01",
    intro: "Build the strategic foundation for your entire application. You'll learn how admissions actually works behind the scenes, how to build a cohesive application narrative, and how to create a timeline that keeps you ahead of every deadline.",
    content: `
      <h2>How Admissions Actually Works (Behind the Curtain)</h2>
      <p>Before you fill out a single field, you need to understand what happens on the other side. At most selective colleges, your application goes through two to three reads. The first reader — often a regional admissions officer who covers your geographic area — spends about 8 to 15 minutes with your entire file. They write an internal summary and assign preliminary ratings across several dimensions: academics, extracurriculars, personal qualities, and essay strength.</p>
      <p>Your file then goes to a second reader, and eventually to committee — a room of admissions officers who discuss borderline cases. Here's what this means for you: your application needs to be <em>instantly legible</em>. The reader should be able to articulate who you are and why you matter within minutes. If they can't, you're at a disadvantage no matter how impressive your resume is.</p>
      <p>This means every section of your application should reinforce the same core narrative. Your activities, your essay, your additional information, even your course selection — they should all point in the same direction. Not because you're being strategic in a manipulative way, but because coherence is how real people actually work. The student who loves marine biology volunteers at the aquarium, takes AP Environmental Science, writes about the ocean, and wants to study ecology. That's not manufactured — that's a person whose application makes sense.</p>

      <div class="callout"><strong>🎯 The Narrative Test</strong>After you finish your application, a stranger should be able to read it and answer in one sentence: "This is a student who ___." If they can't fill in that blank clearly, your application lacks coherence. This doesn't mean you need a single "spike" — it means your different interests and experiences should connect to paint a recognizable picture of a real person.</div>

      <h2>The Three Pillars of a Strong Application</h2>
      <p>Every successful application rests on three pillars, and you need all three working together:</p>
      <p><strong>Pillar 1: Academic Foundation.</strong> This is your transcript, course rigor, and test scores (if submitting). It answers: "Can this student do the work?" You can't change your GPA at this point, but you can contextualize it and make sure your course selection tells the right story. We'll cover this in Module 3.</p>
      <p><strong>Pillar 2: Impact & Engagement.</strong> This is your activities list, honors, and any additional materials. It answers: "What does this student do with their time, and do they make a difference?" Depth beats breadth every time. We'll cover this in Module 4.</p>
      <p><strong>Pillar 3: Voice & Self-Awareness.</strong> This is your essays — personal statement, supplements, and additional information. It answers: "Who is this person beyond the numbers, and are they reflective enough to grow in college?" This is where most students either break through or blend in. We'll cover this across Modules 5, 6, and 8.</p>

      <h2>Building Your Application Timeline</h2>
      <p>The biggest mistake students make is treating the Common App like something you do in October. The strongest applications are built over months. Here's a realistic timeline that accounts for the actual work involved:</p>
      <p><strong>June–July (Summer Before Senior Year):</strong> This is your golden window. Finalize your college list (aim for 8–12 schools across reach, match, and safety categories). Begin brainstorming your personal essay — not writing it yet, just collecting ideas, memories, and moments. Visit campuses if possible, or do deep virtual research. Start a document for each school with notes on specific programs, professors, clubs, and opportunities that interest you. This document will save you weeks when you write supplements later.</p>
      <p><strong>August:</strong> Write your first full draft of the personal essay. It will be rough — that's the point. Ask two or three teachers in person if they'll write recommendations (do this in the first week of school if you couldn't do it in the spring). Begin filling in the activities section — draft all 10 descriptions even if you revise them later.</p>
      <p><strong>September:</strong> Revise your personal essay through at least two more drafts. Get feedback from a trusted reader — a teacher, counselor, older sibling, or mentor. Start drafting supplemental essays for your Early Decision/Early Action schools. Complete all profile sections (demographics, family, education) so you're not scrambling later.</p>
      <p><strong>October:</strong> Finalize your personal essay. Complete all EA/ED supplements. Have a full application review — read every section as if you were the admissions officer seeing it for the first time. Submit EA/ED applications at least 3 days before the deadline to avoid technical issues.</p>
      <p><strong>November–December:</strong> Shift to Regular Decision supplements. You now have the personal essay locked in and the activities section polished, so all your energy goes to school-specific writing. Submit RD applications by December 20 at the latest — don't wait until January 1.</p>

      <div class="callout"><strong>⚠️ The Early Decision Calculation</strong>Applying ED roughly doubles your acceptance rate at many selective schools. But it's binding — you must attend if accepted. Only use ED if you have a clear first-choice school AND the financial aid situation is something your family can navigate. If finances are a concern, Early Action (non-binding) gives you a similar timing advantage without the commitment.</div>

      <h2>The 7 Mistakes That Tank Applications</h2>
      <p><strong>1. Starting the personal essay in October.</strong> The essay alone takes most students 4–6 weeks of real writing and revision. Starting in October for a November 1 deadline means you're submitting a second draft at best.</p>
      <p><strong>2. Writing what you think they want to hear.</strong> Admissions officers read 30+ essays a day. They can spot a performance instantly. The essays that stand out are the ones that sound like a real person wrote them — not a college applicant trying to sound impressive.</p>
      <p><strong>3. Treating activities like a resume.</strong> You have 150 characters per description. That's about one sentence. If you waste it on generic descriptions ("Member of National Honor Society"), you've told the reader nothing. Every word needs to show impact.</p>
      <p><strong>4. Writing generic "Why Us" supplements.</strong> If you could swap the school's name with another school and the essay would still work, it's not specific enough. This is the single most common supplement mistake.</p>
      <p><strong>5. Asking the wrong people for recommendations.</strong> A glowing letter from a teacher who genuinely knows you will always beat a lukewarm letter from someone more prestigious. We'll cover exactly how to choose in Module 7.</p>
      <p><strong>6. Ignoring the Additional Information section.</strong> Most students leave it blank. Used well, it can explain a GPA dip, add context to your story, or share something that doesn't fit elsewhere. Used poorly (or left empty when it shouldn't be), it's a missed opportunity.</p>
      <p><strong>7. Not reading your application as a whole.</strong> Before you submit, read every section back-to-back as if you're the admissions officer. Does it tell a coherent story? Are you repeating yourself? Does it feel like one person wrote it, or like a committee assembled it?</p>

      <h2>Your Assignment</h2>
      <p>Do this before moving to Module 2. Open a blank document and spend 20 minutes on these two exercises:</p>
      <p><strong>Exercise 1:</strong> Write down your answer to this question in one paragraph, without editing yourself: "If I could tell an admissions officer one thing about myself that isn't anywhere else in my application, what would it be?"</p>
      <p><strong>Exercise 2:</strong> Write down the names of 3–5 people who know you well enough to describe your personality, values, and how you show up in the world. Next to each name, write one sentence about what they'd say. This is the beginning of understanding your own narrative — and you'll come back to it throughout this course.</p>
    `
  },
  {
    id: 2,
    title: "Profile & Background Sections",
    tag: "Module 02",
    intro: "The profile sections feel like routine data entry — but several questions carry real strategic weight. Learn exactly how to approach demographics, family background, sensitive disclosures, and identity in a way that's honest, accurate, and works in your favor.",
    content: `
      <h2>Why the Profile Section Matters More Than You Think</h2>
      <p>Most students rush through the profile section because it feels like a form. Name, address, date of birth — straightforward enough. But embedded in these pages are several questions that directly shape how admissions officers understand your context. Context is everything in selective admissions. A 3.7 GPA from a student who worked 20 hours a week, navigated a turbulent home, and attended an under-resourced school is a completely different data point than a 3.7 from a student with full academic support. The profile section is where you begin to establish that context.</p>

      <h2>Citizenship, Residency, and International Students</h2>
      <p>Answer citizenship and residency questions accurately — there's no strategic angle here. If you have dual citizenship, list both. If you're a permanent resident (green card holder), select that option rather than "US Citizen." This matters for financial aid eligibility and institutional reporting, but at most schools it has little to no effect on your admission chances.</p>
      <p>If you are an international student applying from outside the US, be aware that most selective schools admit international students from a separate, often smaller pool. Financial aid availability for international students varies enormously by school — some meet full demonstrated need regardless of citizenship, many do not. Research this before finalizing your list.</p>

      <h2>Family Education & First-Generation Status</h2>
      <p>The Common App asks for your parents' and stepparents' highest level of education. This determines whether you qualify as a first-generation college student — typically defined as a student whose parents did not complete a four-year college degree. If you are first-gen, this is a significant piece of context that many colleges actively value and seek out.</p>
      <p>But here's what most students miss: the designation alone isn't enough. If you're a first-generation student, that experience has almost certainly shaped you in concrete ways — the way you've had to figure things out independently, navigate systems without a roadmap, balance responsibilities at home, or build a vision of your future without family precedent. Those specifics are what make your application compelling. The first-gen box opens a door; your essays and activities have to walk through it.</p>

      <div class="callout"><strong>💡 First-Generation Strategy</strong>If you are a first-gen student, audit your entire application for coherence. Does your essay touch on what this experience has meant to you? Does your additional information section explain any context that shaped your academic path? Does your activities list reflect the full picture of your life — including work, family responsibilities, or community roles that other students might not have? Admissions officers are specifically trained to read first-gen applications with context. Give them that context to work with.</div>

      <h2>Parents' Occupations</h2>
      <p>The Common App asks what your parents do for work. Be accurate and specific — "retail manager" rather than just "works in retail." This information helps admissions officers understand your socioeconomic context, which factors into how they read your academic record and your access to opportunities. There's no answer here that hurts you. Being honest about your family's circumstances only adds context.</p>

      <h2>Household & Family Circumstances</h2>
      <p>If your family situation is non-traditional — you live with a grandparent, a single parent, a guardian, or you are an independent student — fill in these sections accurately. Many schools also ask about household income in supplemental financial aid materials. If your family has experienced financial hardship, a job loss, a medical crisis, or other circumstances that aren't captured by a standard income figure, the Additional Information section (Module 6) is the place to explain that in your own words.</p>

      <h2>Disciplinary & Legal History</h2>
      <p>Some schools ask whether you have been suspended, dismissed, or disciplined at the school level, and whether you have ever been convicted of a crime. Read each question carefully — they are usually narrowly scoped. A detention or a minor referral is typically not what these questions are asking about.</p>
      <p>If you do have something to disclose, honesty is always the right approach. Colleges are far more forgiving of the incident itself than they are of dishonesty. If you answer "yes," you will usually be given space to provide context. Use it. Explain briefly what happened, take ownership, and focus on what you learned or how you've grown since. One paragraph, factual tone, forward-looking. Do not over-explain or be defensive. And consult with your school counselor before submitting — they've navigated this before.</p>

      <h2>Race & Ethnicity (Post-2023)</h2>
      <p>The Supreme Court's 2023 ruling in <em>Students for Fair Admissions v. Harvard</em> changed the legal landscape of race-conscious admissions. Colleges can no longer use race as a direct factor in admissions decisions. However, your racial and ethnic identity can still come through your application — through your essays, your activities, the communities you've been part of, and the experiences that have shaped you. Who you are is still relevant. How it's considered legally has changed.</p>
      <p>Report your race and ethnicity accurately and honestly. This data is used for federal reporting requirements and institutional tracking. It will not be used as a direct admissions factor at schools complying with the ruling, but it still matters for diversity programs, scholarships, and community-building. Be authentic — don't check boxes that don't reflect your actual identity.</p>

      <h2>Your Assignment</h2>
      <p>Go through the full profile section of the Common App and flag any question where your answer carries context that deserves explanation. Write one sentence next to each: "This matters because ___." Then, when you get to Module 6 (Additional Information), you'll have a clear list of what's worth addressing. The goal is to make sure no part of your background is left unexplained when context could make a meaningful difference.</p>
    `

    id: 3,
    title: "Academics & Testing",
    tag: "Module 03",
    intro: "Your transcript is the foundation of your application — but it's not just a number. Learn how admissions officers actually read academic records, how to position course rigor strategically, and how to make the test-optional decision with real data instead of guesswork.",
    content: `
      <h2>How Admissions Officers Read a Transcript</h2>
      <p>When an admissions officer opens your transcript, they're not just looking at your GPA. They're asking four specific questions: How hard did this student work relative to what was available at their school? Is there a trend — up, down, or flat? Are the grades consistent across subjects, or does this student have a clear area of strength? And does the course selection align with what they say they want to study?</p>
      <p>Understanding these four questions changes how you think about your academic record. You can't change your GPA, but you can influence how it's read — through your course selection, through the context you provide, and through the trend your grades show over four years.</p>

      <h2>GPA: What It Actually Means in Context</h2>
      <p>You'll report your GPA exactly as your school calculates it. Do not round up, and do not misrepresent the scale — colleges will receive your official transcript and any discrepancy is treated seriously. If your school reports weighted and unweighted GPAs separately, enter both accurately.</p>
      <p>Trends matter as much as the number. A 3.4 that's been climbing — 2.9 freshman year, 3.3 sophomore, 3.7 junior — tells a dramatically different story than a 3.4 that peaked freshman year and drifted down. The upward trajectory says: this student found their footing, rose to the challenge, and is accelerating. That's exactly what colleges want to admit. If your grades have improved, make sure that story is legible somewhere in your application — in your additional information, your essay, or through the natural arc of your transcript.</p>
      <p>If you experienced a dip — a rough semester, a hard year, a family crisis — address it. Unexplained drops invite the worst interpretation. Explained drops with a clear recovery tell a story of resilience. We'll cover exactly how to do this in Module 6.</p>

      <h2>Course Rigor: The Hidden Admissions Factor</h2>
      <p>At selective colleges, course rigor is often weighted more heavily than GPA alone. An A in a standard-level class is evaluated differently than a B+ in AP or IB. Admissions officers receive a School Profile from your counselor that lists every course your school offers — they know exactly what was available to you. They're evaluating what you chose to take relative to your school's full menu of options.</p>
      <p>This means a few things. First, if your school has AP or IB courses and you've avoided them, that's a noticeable absence. Second, if your school has very few advanced options, that context works in your favor — you can only challenge yourself with what's available. Third, self-directed challenge counts too: dual enrollment at a community college, online courses, summer academic programs. These all signal that you sought rigor proactively.</p>
      <p>The strategic question going into senior year (if you're reading this early enough): take the hardest courses you can genuinely handle — not the hardest courses that exist, but the hardest ones you can perform well in. A B in AP Calculus signals more rigor than an A in standard Math. But a C in AP Calculus, with no clear explanation, raises questions. Know your own capacity honestly.</p>

      <div class="callout"><strong>📋 The Rigor Audit</strong>Look at your transcript and count: how many AP, IB, Honors, or dual-enrollment courses have you taken each year? Is the number increasing? Is it in the subjects related to what you say you want to study? If you're a junior or senior, this audit tells you whether your course selection is telling the right story — and whether there's anything you can still do about it.</div>

      <h2>The Test-Optional Decision: A Framework</h2>
      <p>Most selective colleges remain test-optional or test-flexible. Here is the actual framework for deciding whether to submit your scores — not a rule of thumb, but a real decision process.</p>
      <p><strong>Step 1: Find the school's middle 50%.</strong> Search "[School Name] Common Data Set" and look at Section C9. This shows the SAT and ACT scores of the enrolled freshman class — the 25th and 75th percentiles. This is your benchmark, not the "average score" cited on marketing materials.</p>
      <p><strong>Step 2: Apply the decision rules.</strong> If your score is at or above the 75th percentile, submit it — it strengthens your application. If your score is between the 25th and 75th percentiles, submitting is neutral to mildly positive. If your score is below the 25th percentile, withholding it is usually the right call. The score would only raise questions without adding anything positive.</p>
      <p><strong>Step 3: Check the school's actual policy.</strong> Some schools that say they're "test-optional" still use scores for merit scholarships, honors programs, or departmental review. Read the fine print. At some schools, not submitting a score is truly neutral. At others, there's a subtle institutional preference for submitted scores in competitive applicant pools.</p>
      <p><strong>Step 4: Consider your overall profile.</strong> If your GPA is the strongest part of your application, you may not need a score to bolster it. If your GPA is below the school's median and your score is strong, submitting can help rebalance the picture. Scores and GPA should work together — not compensate for each other in a way that draws attention to the weaker number.</p>

      <h2>AP Scores: What to Report</h2>
      <p>AP scores are self-reported on the Common App and aren't verified until after enrollment. Here's the reporting strategy:</p>
      <p>Report scores of 4 or 5 — always. Report scores of 3 selectively: include them if they're in a subject directly related to your intended major or concentration. Leave off scores of 1 or 2 entirely. No explanation needed — you simply don't list them.</p>
      <p>One nuance: if you're applying to highly selective schools and have taken many APs, a pattern of 3s across the board when your peers are posting 4s and 5s can subtly undercut the rigor story your transcript is telling. Be aware of what the collective picture looks like, not just individual scores.</p>

      <h2>Intended Major: How to Choose What to List</h2>
      <p>The Common App asks for your intended major or area of study, but at most schools this is non-binding — you can change it after enrollment. The question is really about context and fit. If you have a clear focus, list it. It helps admissions officers understand your academic interests and evaluate whether your course selection aligns with your goals.</p>
      <p>If you're genuinely undecided, "Undecided" or "Undeclared" is a valid and common answer. Some schools — especially liberal arts colleges — actively value intellectual curiosity over premature specialization. What you should avoid is listing a specific major purely because you think it's what the school wants to hear, especially if your transcript and activities don't support it. Misalignment between stated major and everything else in your application is noticeable.</p>

      <h2>Your Assignment</h2>
      <p>Pull up your transcript and do two things. First, write one honest sentence about the story your grades tell — trend, consistency, areas of strength, and anything that needs context. Second, look up the Common Data Set for your top three schools and find the middle 50% test score ranges. Write down whether submitting your score helps, hurts, or is neutral for each one. You now have a school-specific decision on testing, not a one-size-fits-all answer.</p>

    content: `
      <h2>What the Activities Section Is Actually Doing</h2>
      <p>The activities section gives you 10 slots, each with a 50-character position/role field and a 150-character description. That's roughly one sentence per activity. At first glance it feels limiting. But here's the thing: constraints force clarity. A reader who has 8 minutes with your application doesn't want paragraphs — they want to understand immediately what you did, how much it mattered, and what it says about you as a person.</p>
      <p>This section answers two questions admissions officers are always asking: "What does this student actually do with their time?" and "Do they go deep, or just wide?" Depth signals genuine passion, real growth, and the kind of commitment that translates to college. Breadth for its own sake — 12 clubs, all with minimal time investment — signals résumé-padding, and officers recognize it instantly.</p>

      <h2>The Ranking Framework</h2>
      <p>Your most important activity goes first. But "most important" is not the same as "most impressive to outsiders" — it means most central to your identity, your story, and the version of yourself you're presenting in this application.</p>
      <p>To rank your activities, build a simple table. For each activity, note: hours per week, weeks per year, years of involvement, your specific role, and one concrete thing you achieved or changed. Now rank them by a weighted combination of: time invested (depth of commitment), impact (did anything happen because you were there?), and narrative fit (does this activity reinforce the core story your application is telling?).</p>
      <p>A student who spent 15 hours a week working a part-time job to help their family should list that above a club they attended for one hour a month. Real life, real responsibility, real time — that's more meaningful than a roster full of low-commitment memberships. Admissions officers know the difference.</p>

      <div class="callout"><strong>📝 The Inventory Exercise</strong>Before you write a single description, make a complete list of everything you've done in the past four years — every job, every team, every personal project, every family responsibility, every creative pursuit, every community involvement. Include things you might not think "count." Part-time work counts. Babysitting a sibling counts. Teaching yourself to code counts. Self-directed learning counts. Once you have the full list, rank it and cut to your best 10.</div>

      <h2>Writing Descriptions That Actually Work</h2>
      <p>The single biggest mistake in this section: describing what the activity is instead of what <em>you</em> did. An admissions officer already knows what debate team is. They don't know what <em>you</em> did on debate team. Show them.</p>
      <p>The formula for a strong 150-character description is: <strong>action verb + specific role/task + measurable impact or outcome</strong>. Every description should start with a verb (not "Member of" or "Participated in"). Quantify wherever possible — numbers make vague claims concrete. And focus on what changed because you were involved.</p>
      <p>Here's the difference in practice:</p>
      <blockquote>❌ "Member of the debate team. Competed in regional and state tournaments." — This tells the reader nothing about you. It could describe any of 30 members.</blockquote>
      <blockquote>✅ "Co-captain; coached 8 underclassmen on argumentation; led team to first state semifinal in 6 years; wrote 40+ original briefs on criminal justice reform." — This is specific, quantified, shows leadership and intellectual investment, and reveals something about your values.</blockquote>
      <p>You have 150 characters — roughly one sentence. Every word has to earn its place. Cut filler phrases like "I was responsible for" or "helped with." Start with the verb. Get to the impact as fast as possible.</p>

      <h2>The Position/Role Field (50 Characters)</h2>
      <p>Don't waste this field on the activity's official name — that's already captured in the category dropdown. Use it for your specific title or role: "Founder & Editor-in-Chief," "Starting Varsity Point Guard," "Lead Organizer," "Head Tutor." If you held multiple roles over time, list the most senior one. If your title doesn't capture your actual function, invent a descriptive one: "Program Coordinator" instead of "Member."</p>

      <h2>Categories and How to Use Them</h2>
      <p>The Common App provides a dropdown of activity categories (Athletics, Community Service, Work, etc.). Choose the most accurate one — admissions officers sort and scan by category. One underused category: "Family Responsibilities." If you regularly care for a sibling, support a parent, manage household tasks, or contribute to a family business, this is a legitimate and important category. Don't bury it under "Other" or leave it off because it feels too personal. It shows maturity, responsibility, and real-world experience that many applicants lack.</p>

      <h2>What to Do When Your List Is Short</h2>
      <p>Not having 10 polished activities doesn't mean you're at a disadvantage — it means you need to be strategic about what you do list. Colleges understand that students don't all have the same access to clubs, teams, and programs. What they're looking for is genuine engagement, not volume.</p>
      <p>If your list feels thin, audit your actual life. A part-time job (even if it's not glamorous) shows work ethic and time management. Independent creative work — writing, music, art, coding projects, YouTube — counts. Religious or cultural participation counts. Athletic training, even without a school team, counts. The goal is to capture the full picture of how you actually spend your time.</p>

      <p>You have 5 slots for honors and awards. Use them for your strongest recognitions — academic awards, competition placements, scholarships, national designations (National Merit, National Hispanic Recognition, etc.). For any award that isn't nationally known, add context in the description: "Top 3 of 200 applicants; regional science fair sponsored by [organization]." A reader in another state won't know what your local award means unless you tell them.</p>
      <p>If you have fewer than 5 meaningful honors, don't fill slots with minor awards just to fill them. A shorter list of strong recognitions looks better than a padded list that includes your sophomore-year attendance award.</p>

      <h2>Your Assignment</h2>
      <p>Write all 10 activity descriptions in a separate document first — don't type them directly into the Common App. For each one, draft a version, then cut it to 150 characters. Then read all 10 descriptions back-to-back. Ask yourself: does this list tell a story? Does it show depth anywhere? Does it capture the full picture of how I spend my time? Revise until the answer to all three is yes.</p>

    intro: "The personal essay is the one place in the entire application where you get to speak in your own voice. It's also where most students either break through or blend in. This module walks you through the full process — from finding a topic, to building a structure, to revising until it's genuinely good.",
    content: `
      <h2>What the Personal Essay Is Actually For</h2>
      <p>Let's start with what it isn't. The personal essay is not a summary of your achievements. It's not a chance to explain your GPA. It's not a formal statement of purpose. It's not an opportunity to tell the admissions officer what you think they want to hear.</p>
      <p>What it is: the one space in the entire application where a human being gets to come through. Admissions officers read hundreds of essays. The ones they remember — the ones that actually move the needle — are the ones where they finish reading and feel like they know someone. Not a candidate. A person.</p>
      <p>Your essay doesn't need to be dramatic. It doesn't need to cover a life-changing event. It needs to be specific, honest, and written in a voice that sounds like you at your most thoughtful. That's the whole standard.</p>

      <h2>The 7 Prompts: How to Actually Choose</h2>
      <p>The Common App offers 7 prompts. Here's the truth: the prompt matters far less than your response. Most strong essays could technically fit under three or four different prompts. Your job is not to find the "right" prompt — it's to find the topic you most need to write about and then select the prompt that gives you the most freedom to write it.</p>
      <p><strong>Prompt 1</strong> ("Share your story") and <strong>Prompt 7</strong> ("Topic of your choice") are the most open-ended and tend to produce the strongest essays precisely because they don't constrain the writer. If you have a topic you're drawn to and it doesn't fit neatly under a more specific prompt, use one of these.</p>
      <p><strong>Prompt 2</strong> (overcoming a challenge) is the most commonly chosen — and the most commonly botched. The risk: it can easily become a narrative of hardship without reflection, which comes across as either self-pitying or surface-level. If you use this prompt, the emphasis must be on what you learned and who you became, not on the difficulty itself.</p>
      <p><strong>Prompt 5</strong> (transition or growth) works well for students who can identify a genuinely meaningful shift in how they see themselves or the world. The trap here is vagueness. "I grew a lot" is not a college essay. "The specific moment I realized I'd been wrong about X, and what changed" is.</p>

      <h2>Finding Your Topic: The Real Method</h2>
      <p>The best topics are almost never the "big moment." The sports championship, the death of a grandparent, the mission trip, the immigrant story of hardship — these are not bad topics, but they are common, and they invite clichés. Unless the writing is truly extraordinary, they tend to produce essays that feel familiar rather than specific.</p>
      <p>The essays that stand out are almost always about something small that reveals something large. The ritual, the habit, the recurring memory, the small obsession, the thing you do when no one is watching. These small subjects force specificity — and specificity is what makes writing memorable.</p>
      <p>Here are the brainstorming questions that surface the best topics:</p>
      <p>What do you do or think about when you have completely free time — not what you think you should do, but what you actually do? What's a recurring memory from childhood that you still think about? What's something you believe that most people around you don't? What's a problem you've tried to solve that no one asked you to? What's something you've changed your mind about, and why? What do you do differently from everyone around you?</p>
      <p>Set a timer for 20 minutes and write down every answer that comes up — no filtering, no judgment. Then read the list and ask: which one of these could I write three pages about without running out of things to say? That's almost always your essay topic.</p>

      <div class="callout"><strong>✍️ The Specificity Test</strong>Take your topic and try to write three specific, concrete details about it — not abstractions, but things you could see, hear, or touch. If you can easily write three, you have a workable topic. If you're struggling to get past one, the topic is probably too broad or too abstract. "How I learned to be resilient" fails this test. "The night I stayed up until 2am rebuilding the code for our school's website, and what I was thinking about" passes it.</div>

      <p>Here's a real example of the small-reveals-large principle at work. The following is from TJ Wilson's UCLA supplement on his greatest skill — but notice how the topic (watching his father fall asleep) is the kind of "small" moment most students would never consider writing about:</p>

      <div class="essay-example">
        <div class="essay-example-header">
          <div>
            <div class="essay-label">Real Supplement · "What is your greatest talent or skill?" · UCLA</div>
            <div class="essay-school">TJ Wilson — UCLA</div>
          </div>
          <div class="essay-badge">✓ Submitted</div>
        </div>
        <div class="essay-example-body">
          <p>I watch as he falls asleep. I watch as his phone hits the floor. I watch as night turns to day. I watch as things stay the same. My father's health condition has constricted him to have very little energy, very little ambition. I never wanted to end up in his physical state, he tries his best with what he has left, but I've come to accept that all I can do is observe.</p>
          <p>Observing became my greatest skill, and I can attribute that to my father. It was watching the medical bills drain the life out of him, the resentment he held within himself, the self awareness that arose with his age, the vulnerability when he wasn't physically able to do something. These experiences developed into me taking a backseat in situations so that I can take the time to watch and understand.</p>
          <p>I don't think those activities are a skill, but when it's excessive and purposeful it becomes a useful talent. Interest in writing and film allow me to demonstrate this talent by way of having an "eye" for things. Watching, writing, understanding, and further witnessing changes. This process has been an outline for relationships with my peers, as I grew a habit of documenting the nuances of relationships as I observe change or growth. I find beauty in the longevity of some relationships that I observe, such as my father's, but often even more beauty in the fruitfulness of a short lived relationship with true closure. From what I've seen, from what I've observed, we crave the bitter endings as we fail to comprehend how sweet the present is. Prediction is the opposite of observation, to ignore what is truly happening as to assume you know better is asinine. Learn in the moment and hold onto what you see around you. To look ahead is to stare into a mirror of uncertainty, unsure of what is happening now and unsure of what will happen next. I watch as he intended me to.</p>
        </div>
        <div class="essay-annotation">
          <div class="annotation-title">🔍 Small topic. Large meaning.</div>
          <div class="annotation-point"><span class="tag">THE TOPIC</span><span>The "skill" is observation. That's abstract. But the essay grounds it in something completely specific and visual: watching his father fall asleep, his phone hitting the floor. That image makes the whole thing real.</span></div>
          <div class="annotation-point"><span class="tag">OPENING</span><span>"I watch as he falls asleep. I watch as his phone hits the floor." Four short parallel sentences. This is the kind of opening that makes a reader stop. It's quiet, it's cinematic, and it earns attention without announcing itself.</span></div>
          <div class="annotation-point"><span class="tag">SMALL → LARGE</span><span>From watching his father sleep → to a philosophy of observation → to film, writing, relationships. The essay moves outward from a single small moment into something much larger. That's the small-reveals-large structure working exactly as it should.</span></div>
          <div class="annotation-point"><span class="tag">CLOSING</span><span>"I watch as he intended me to." The essay ends by returning to the father, closing the loop. Simple, resonant, earned. The best closings circle back — they don't introduce something new; they deepen what was already there.</span></div>
        </div>
      </div>

      <h2>Structure: What Actually Works</h2>
      <p>There is no single right structure for a personal essay. But there are structures that work more reliably than others, especially for writers who aren't doing this professionally.</p>
      <p><strong>The Scene-Reflection structure</strong> is the most reliable. Open in the middle of a specific moment — put the reader right there with you. Establish context briefly. Move into reflection: what does this moment mean? What does it reveal? What did you learn, realize, or come to understand? Close by connecting the past to the present or future — not as a grand conclusion, but as a natural landing.</p>
      <p><strong>The Montage structure</strong> works for students whose story doesn't center on one event. Three or four specific scenes or images, connected by a unifying theme or question. This is harder to execute well — each section needs to be tight and the through-line needs to be clear — but when it works, it produces some of the most distinctive essays.</p>
      <p><strong>The Reflective Essay</strong> is less event-driven and more idea-driven. You're exploring a question, a tension, a belief. This works if you're a strong analytical writer and have genuine intellectual depth to bring to the topic. It fails if it becomes a series of abstract claims with no grounding in specific experience.</p>
      <p>Whichever structure you choose: your opening line matters enormously. An admissions officer who has read 30 essays today will decide within the first two sentences whether yours feels different. Don't start with a quote you found online. Don't start with a dictionary definition. Start in the middle of something real.</p>

      <h2>Voice: The Thing Most Students Kill</h2>
      <p>Voice is the element that separates essays that are technically correct from essays that are actually good. And it's the element students most reliably destroy in revision — usually because they're trying to sound smarter, more formal, or more "college essay-ish."</p>
      <p>Your voice is how you sound when you're being thoughtful and honest with someone you trust. Not how you sound in a formal paper. Not how you sound trying to impress someone. The version of you that's real.</p>
      <p>Here's the test: read your essay out loud. Not in your head — actually out loud. If a sentence makes you stumble, rewrite it. If a word doesn't sound like something you'd ever actually say, replace it with one that does. If a passage feels like you're performing rather than speaking, cut it and say the same thing more directly. The goal is for someone to read your essay and feel like they just had a real conversation with you.</p>

      <h2>Revision: The Real Work</h2>
      <p>Your first draft is not your final draft. It's not even close. Plan for a minimum of three to five rounds of real revision — not proofreading, but actual rewriting. Here's how to approach each pass:</p>
      <p><strong>Draft 1:</strong> Write it all the way through without stopping to edit. Get everything out. It will be rough. That's fine.</p>
      <p><strong>Draft 2:</strong> Read it as a stranger. Where does your attention drift? Cut those sections. Where does the writing feel vague or abstract? Replace abstractions with specific details. Where are you telling instead of showing? Rewrite to show.</p>
      <p><strong>Draft 3:</strong> Read it out loud. Fix every sentence that doesn't sound natural. Cut every word that doesn't need to be there. Tighten the opening — most first drafts bury the real beginning three paragraphs in. Strengthen the closing — it should land, not drift.</p>
      <p><strong>Draft 4+:</strong> Get feedback from a trusted reader — someone who will be honest, not just supportive. Ask them one question: "After reading this, do you feel like you know me better?" If yes, you're close. If no, ask them where they lost the thread and revise from there.</p>
      <p>The benchmark for a finished essay: a stranger reads it and feels like they've met a specific, real, memorable person. Not a great student. A person.</p>

      <h2>Real Example: The Personal Statement That Got In</h2>
      <p>Below is the actual personal statement written by TJ Wilson, founder of The Common App Playbook. Read it once through without stopping, then read the annotations below it. Notice how the principles from this module show up in practice.</p>

      <div class="essay-example">
        <div class="essay-example-header">
          <div>
            <div class="essay-label">Real Personal Statement · Common App</div>
            <div class="essay-school">TJ Wilson — Admitted Applicant</div>
          </div>
          <div class="essay-badge">✓ Admitted</div>
        </div>
        <div class="essay-example-body">
          <p>I walk the halls and I feel like the man. As my time as an adolescent wanes the duality of the life that I live begins to become apparent to me. Mentally I see myself as "average" and at times mediocre, this diseased mindset drives me to work towards achieving things in hopes of compensating. On the other hand, I have come to flourish in social settings, people know who I am today because of what they see and hear, but to me I am still the child that relives the moments that caused my childhood to decay without him noticing. A self lived juxtaposition that has fully made me who I have become, a mindset that questions what I believe in, and an ignorance only to be obtained from a classic high school social hierarchy. With each passing day I attempt to romanticize the mundane, not letting slip from my grasp as I contemplate how much change is destined in the coming year. These thoughts causing me to lose haste with my actions in the present, but for some reason when the bell rings and I get up, I walk the halls and I feel like the man.</p>
          <p>I emphasize the previous line as I return to when I first wrote it in a poem, a poem describing a high school experience from the point of view of a dangerously introspective student. That student wasn't me, but instead a character that I adopted as the "traumas" of my life started to catch up to me. School has been a bubble for me to live in, apart from the divorce, the home invasion, the discrimination, and the arguments over social issues that my family would never budge about. There was a turning point after my mom and sisters moved out, when my father lost his business leaving us in limbo, and when my idealistic mind was broken when I encountered true bigotry. A point where reality humbled me in ways I previously tried to ignore, in ways that infested my mindset that thought I was invincible to the forces of life. At school I made myself my own person without realizing I was simply splitting my time. There wasn't some different character or version of me. No, it was always me and I was finding growth in my interests while avoiding problems that I had no control over. I recall my experience talking to my youth pastor in a time where I felt like there wasn't a God or religion that could save me. Being in pure despair trying to understand why I suddenly felt so strongly about a past that I previously dismissed, he listened to all the reasons I gave as to why I'd rather not live out the rest of my life. Following my ramble, he explained plainly saying, "I can't relate, I never saw or lived your life, but you are here talking to me. Whether it is God or not, you made it to this situation with lack of a better reason other than it being meant for you." This conversation took place at the end of a summer break, I returned to school where I walk the halls and I feel like the man.</p>
          <p>As I repeat that egotistical line once again, it comes from a restored heart, a truly thoughtful mind. I feel no need to expatiate on my life's sob story because I value my mindset more than anything that was meant to happen unannounced to me. Holding hate in my heart for anything that I was put through or that I had to battle would be to carry the world's weight on my shoulders. A weight that I could never grow under, a weight not responsible for my strength today. Strength that craves creation, a hunger from which I can not depart.</p>
        </div>
        <div class="essay-annotation">
          <div class="annotation-title">🔍 What's working — craft breakdown</div>
          <div class="annotation-point"><span class="tag">HOOK</span><span>The essay opens mid-thought with a line from a poem TJ actually wrote. This is specific, unexpected, and immediately establishes a voice. It doesn't start with "I was born" or a dictionary definition — it drops you into something real.</span></div>
          <div class="annotation-point"><span class="tag">REFRAIN</span><span>That opening line — "I walk the halls and I feel like the man" — repeats three times, each time carrying new weight. The structure creates momentum and makes the essay feel intentional, like a piece of writing, not just a form response.</span></div>
          <div class="annotation-point"><span class="tag">VULNERABILITY</span><span>The second paragraph names hard things directly — divorce, home invasion, discrimination, his father losing the business. Notice: TJ doesn't dwell, doesn't dramatize, doesn't ask for sympathy. He states and moves. That restraint is what makes it land.</span></div>
          <div class="annotation-point"><span class="tag">NO SELF-PITY</span><span>"I feel no need to expatiate on my life's sob story." This line is doing enormous work. It preempts the reader's instinct to categorize this as a hardship essay — and reframes the whole piece as being about mindset, not circumstance.</span></div>
          <div class="annotation-point"><span class="tag">VOICE</span><span>"A weight that I could never grow under." "Strength that craves creation." This is not AP Essay prose. It sounds like a specific person with a specific way of seeing the world. That's what you're aiming for.</span></div>
          <div class="annotation-point"><span class="tag">ENDING</span><span>The essay doesn't resolve neatly. It ends on forward motion — "a hunger from which I can not depart." That's honest. The best essay endings don't wrap up with a bow; they land on something true.</span></div>
        </div>
      </div>

      <h2>What to Take From This</h2>
      <p>You don't need a dramatic life story to write a strong personal essay. What you need is honesty, specificity, and a voice that sounds like no one else. TJ's essay works not because of what happened to him, but because of how he processed it — and because the writing itself reflects a person who is genuinely reflective and self-aware. That's what admissions officers are looking for.</p>
      <p>The structural device — a repeated line, used as a frame — is something any writer can use. Find your equivalent: a question you keep returning to, an image that keeps appearing, a contradiction you're living with. Build the essay around that.</p>

      <h2>Your Assignment</h2>
      <p>Do the 20-minute brainstorm using the questions above. Write down every topic that surfaces without judging any of them. Then pick two or three that feel most alive to you and write the first paragraph of each — just the opening, no more. Read them back. The one that sounds most like you, and least like a college essay, is almost certainly the right direction.</p>
    `

    content: `
      <h2>What This Section Actually Is</h2>
      <p>The Additional Information section is a 650-word free-response field near the end of the Common App. It's completely optional — you are not required to fill it in, and many strong applicants don't. But "optional" doesn't mean "unimportant." It means the section carries no default weight either way. What you put here — if you put anything — needs to genuinely add something.</p>
      <p>Think of it this way: the rest of your application is structured. Every other section has a specific purpose and format. This section has no constraints except length. That makes it the right place to say anything that genuinely needs to be said but doesn't fit anywhere else — not as a narrative, but as clear, direct, useful information for the reader.</p>

      <h2>When You Should Use It</h2>
      <p><strong>1. Explaining an academic setback or inconsistency.</strong> If your GPA dropped significantly in one semester or one year, admissions officers will notice. An unexplained drop invites the worst interpretation — they'll assume disengagement, poor decisions, or lack of resilience. An explained drop, with context, becomes a story about what you faced and how you came back. Two to four sentences is usually enough: what happened, how it affected you, and what changed afterward. Be factual, not defensive.</p>
      <p><strong>2. Adding overflow from the activities section.</strong> If you had meaningful activities or leadership roles that didn't fit in 10 slots, list them here briefly. Don't write descriptions — just name them, with roles and dates. The reader will appreciate the efficiency.</p>
      <p><strong>3. Explaining an unusual transcript.</strong> If you transferred schools, took a gap semester, were homeschooled, or have coursework from multiple institutions, clarify that here so the reader isn't confused by what they're seeing. Confusion is never good.</p>

      <h2>What Makes a Recommendation Letter Actually Good</h2>
      <p>Most recommendation letters are adequate. They confirm that you're a good student, that you participate in class, that your teachers like you. They don't hurt — but they don't help either. The letters that move the needle are specific, surprising, and human. They tell a story a transcript can't tell. They make the reader think: "I want to meet this person."</p>

      <p>Ask in person. Not by email, not by text. Schedule a moment — before or after class, during office hours — and have a direct conversation. The script is simple: "I've been thinking about who I want to ask for college recommendations, and I was hoping you'd be willing to write one for me. Would you feel comfortable writing a strong letter?"</p>

      <h2>Why Supplements Matter More Than Most Students Think</h2>
      <p>At highly selective schools, every applicant in the pool has strong grades, strong test scores, and a solid personal statement. What differentiates them in the final read is often the supplements — because the supplements reveal whether you've actually done your homework about the school, whether your interest is genuine, and whether you can write with precision under constraints.</p>

      <p><strong>The "Why This School?" Essay</strong> is the most common supplement and the most important. We'll cover this in depth below.</p>
      <p><strong>Activity Elaboration Essays</strong> ask you to describe a meaningful activity in more depth than the 150-character limit allows. These are a gift. Use them to go beneath the surface — not just what you did, but what it meant, what you learned, what surprised you, what you'd do differently. The worst version of this essay just re-describes the activity at greater length. The best version reveals the inner life behind the outer action.</p>
      <p><strong>Short-answer questions</strong> (50–250 words) often ask things like "What book has most influenced you?" or "Describe an intellectual experience that excited you." These feel small but matter. Apply the same rules as the personal essay: be specific, be honest, sound like yourself. A genuine answer about a book you actually read is infinitely stronger than a strategic answer about a "safe" classic.</p>
      <p><strong>Community contribution essays</strong> ask how you'll add to the campus community. This is not the place for humility. Tell them specifically what you plan to do — clubs you'll join, programs you'll engage with, things you'll bring to conversations in the classroom. Connect it to who you actually are.</p>
      <p><strong>Diversity, identity, and community essays</strong> are appearing more frequently post-2023. These give you space to discuss your background, identity, and lived experience in a way that's now legally separated from the admissions decision. Treat these essays with the same seriousness as your personal statement — they are not lesser sections.</p>

      <p>The "Why This School?" essay is the single most commonly botched supplement. Here's why it fails: most students write about the school's reputation, size, "vibrant community," and "excellent academics." None of that is specific to any school. An admissions officer for Vanderbilt reading a "Why Vanderbilt" essay that could also be a "Why Georgetown" essay will notice immediately — and it signals that you haven't done the work.</p>
      <p>A strong "Why Us" essay has three components, and they need to be specific enough that they could only apply to this school:</p>
      <p><strong>Component 1: Specific academic opportunities.</strong> This means a named professor whose research interests you (and why, specifically). A particular program, certificate, or concentration that doesn't exist at other schools. A course sequence or interdisciplinary major that aligns precisely with what you want to study. The key word is <em>specific</em>. "Strong engineering program" is not specific. "Professor [Name]'s lab work on biofilm resistance, which connects directly to my interest in antibiotic alternatives" is specific.</p>

      <h2>The Most Common Supplement Mistakes</h2>

      <h2>The Pre-Submission Review Process</h2>
      <p>Before you submit anything, go through this review. Do it for every school, separately.</p>

      <p>☐ All school names verified in school-specific essays</p>

// ── State ────────────────────────────────────────────────────────────────────
let currentModule = 0;
let completed = JSON.parse(localStorage.getItem('completedModules') || '[]');

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  renderSidebar();
  loadModule(currentModule);
  updateProgress();
}

function renderSidebar() {
  const list = document.getElementById('moduleList');
  list.innerHTML = modules.map((m, i) => `
    <li class="module-item ${i === currentModule ? 'active' : ''} ${completed.includes(i) ? 'completed' : ''}"
        onclick="loadModule(${i})">
      <div class="module-check">${completed.includes(i) ? '✓' : ''}</div>
      <span class="module-title">${m.tag} — ${m.title}</span>
    </li>
  `).join('');
}

function loadModule(index) {
  currentModule = index;
  const m = modules[index];
  const isLast = index === modules.length - 1;
  const isCompleted = completed.includes(index);

  document.getElementById('mainContent').innerHTML = `
    <div class="lesson-header">
      <span class="lesson-tag">${m.tag} of 8</span>
      <h1>${m.title}</h1>
      <p>${m.intro}</p>
    </div>
    <div class="lesson-body">${m.content}</div>
    <div class="lesson-footer">
      <button class="nav-btn nav-btn-prev" onclick="loadModule(${index - 1})" ${index === 0 ? 'disabled' : ''}>
        ← Previous
      </button>
      ${isLast
        ? `<button class="nav-btn nav-btn-next complete" onclick="markComplete(${index})">
            ${isCompleted ? '✓ Course Complete!' : 'Complete Course ✓'}
           </button>`
        : `<button class="nav-btn nav-btn-next" onclick="markComplete(${index})">
            ${isCompleted ? 'Next →' : 'Mark Complete & Continue →'}
           </button>`
      }
    </div>
  `;

  renderSidebar();
  window.scrollTo(0, 0);
}

function markComplete(index) {
  if (!completed.includes(index)) {
    completed.push(index);
    localStorage.setItem('completedModules', JSON.stringify(completed));
    updateProgress();
  }
  if (index < modules.length - 1) loadModule(index + 1);
  else renderSidebar();
}

function updateProgress() {
  const pct = Math.round((completed.length / modules.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed.length} of ${modules.length} modules complete`;
}

async function logout() {
  await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/login.html';
}

init();
</script>
